<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tennis Bo3 Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=JetBrains+Mono:wght@400;700&family=Heebo:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080c14;--bg2:#0d1220;--card:#111827;--card2:#161f30;
  --border:#1e2d45;--accent:#00d4ff;--gold:#ffc947;--green:#00e5a0;
  --red:#ff3355;--orange:#ff8c00;--blue:#4d9fff;
  --text:#dde4f0;--muted:#5a6a85;--muted2:#3d4f68;
}
body{background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;min-height:100vh;}
.header{background:linear-gradient(160deg,#0a0f1e,#0d1930);border-bottom:1px solid var(--border);padding:18px 18px 14px;}
.header-top{display:flex;align-items:center;gap:10px;}
.header-icon{font-size:28px;filter:drop-shadow(0 0 8px rgba(0,212,255,.5));}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--accent);text-shadow:0 0 20px rgba(0,212,255,.3);}
.header-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:6px;letter-spacing:.5px;}
.tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--bg2);border-bottom:2px solid var(--border);}
.tab{padding:13px 8px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;position:relative;top:2px;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(0,212,255,.04);}
.content{padding:14px;max-width:480px;margin:0 auto;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.row3{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:end;}
.sep{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--muted2);text-align:center;padding-bottom:10px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;}
.field input{background:var(--bg2);border:1.5px solid var(--border);border-radius:7px;padding:10px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;text-align:center;outline:none;width:100%;transition:border-color .15s;-webkit-appearance:none;}
.field input:focus{border-color:var(--accent);}
.btn-group{display:flex;gap:6px;}
.btn-surf{flex:1;padding:10px 6px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg2);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-surf.active-hard{border-color:var(--blue);color:var(--blue);background:rgba(77,159,255,.08);}
.btn-surf.active-clay{border-color:var(--orange);color:var(--orange);background:rgba(255,140,0,.08);}
.btn-surf.active-grass{border-color:var(--green);color:var(--green);background:rgba(0,229,160,.08);}
.btn-srv{flex:1;padding:9px 8px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg2);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-srv.active{border-color:var(--gold);color:var(--gold);background:rgba(255,201,71,.08);}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.qs{padding:7px 9px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .15s;text-align:right;}
.qs:hover{border-color:var(--accent);background:rgba(0,212,255,.04);}
.qs.gold-state{border-color:rgba(255,201,71,.3);}
.qs-num{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--accent);display:block;margin-bottom:2px;}
.qs-num.g{color:var(--gold);}
.qs-desc{font-size:11px;color:var(--muted);line-height:1.3;}
.calc-btn{width:100%;padding:16px;background:linear-gradient(135deg,#005580,#007daa);border:none;border-radius:10px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:2px;cursor:pointer;margin:4px 0 10px;transition:all .2s;box-shadow:0 4px 20px rgba(0,212,255,.15);}
.calc-btn:hover{background:linear-gradient(135deg,#006699,#009acc);}
.calc-btn:active{transform:scale(.98);}
.error{background:rgba(255,51,85,.08);border:1px solid rgba(255,51,85,.4);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:8px;display:none;}
.error.show{display:block;}
.result{background:linear-gradient(160deg,#0a1428,#0d1830);border:2px solid var(--accent);border-radius:12px;padding:22px 18px;text-align:center;display:none;box-shadow:0 0 40px rgba(0,212,255,.1);}
.result.show{display:block;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.result-who{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.5px;margin-bottom:4px;}
.result-pct{font-family:'Barlow Condensed',sans-serif;font-size:88px;font-weight:900;line-height:1;letter-spacing:-2px;margin:4px 0 8px;text-shadow:0 0 30px currentColor;}
.result-pct.hi{color:var(--green);}
.result-pct.mid{color:var(--gold);}
.result-pct.lo{color:var(--orange);}
.result-pct.crit{color:var(--red);}
.result-band{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:4px 14px;border-radius:20px;margin-bottom:14px;}
.result-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.result-cell{background:var(--card2);padding:10px 6px;text-align:center;}
.result-cell-val{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:var(--text);}
.result-cell-key{font-size:10px;color:var(--muted);margin-top:3px;}
.result-note{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted2);line-height:1.6;border-top:1px solid var(--border);padding-top:10px;}
.helper{font-size:11px;color:var(--muted);margin-top:5px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="header-icon">🎾</span>
    <div>
      <div class="header-title">TENNIS Bo3 CALCULATOR</div>
    </div>
  </div>
  <div class="header-sub">MARKOV CHAIN · ELO-CALIBRATED · HARD / CLAY / GRASS</div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-atp" onclick="setTour('ATP')">Men — ATP</div>
  <div class="tab" id="tab-wta" onclick="setTour('WTA')">Women — WTA</div>
</div>

<div class="content">

  <div class="card">
    <div class="card-title">Elo Rating</div>
    <div class="row2">
      <div class="field">
        <label>Player A</label>
        <input type="number" id="elo-a" placeholder="2100" inputmode="numeric">
      </div>
      <div class="field">
        <label>Player B</label>
        <input type="number" id="elo-b" placeholder="1900" inputmode="numeric">
      </div>
    </div>
    <div class="helper">Favorite = higher Elo (regardless of A/B)</div>
  </div>

  <div class="card">
    <div class="card-title">Surface</div>
    <div class="btn-group">
      <button class="btn-surf active-hard" id="sf-hard" onclick="setSurf('hard')">Hard</button>
      <button class="btn-surf" id="sf-clay" onclick="setSurf('clay')">Clay</button>
      <button class="btn-surf" id="sf-grass" onclick="setSurf('grass')">Grass</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Match State</div>
    <div style="margin-bottom:12px">
      <div class="field" style="margin-bottom:4px"><label>Sets Won</label></div>
      <div class="row3">
        <div class="field"><label>Player A</label><input type="number" id="sets-a" value="0" min="0" max="1" inputmode="numeric"></div>
        <div class="sep">-</div>
        <div class="field"><label>Player B</label><input type="number" id="sets-b" value="0" min="0" max="1" inputmode="numeric"></div>
      </div>
    </div>
    <div style="margin-bottom:12px">
      <div class="field" style="margin-bottom:4px"><label>Games in Current Set</label></div>
      <div class="row3">
        <div class="field"><label>Player A</label><input type="number" id="games-a" value="0" min="0" max="7" inputmode="numeric"></div>
        <div class="sep">-</div>
        <div class="field"><label>Player B</label><input type="number" id="games-b" value="0" min="0" max="7" inputmode="numeric"></div>
      </div>
    </div>
    <div class="field">
      <label>Who is serving?</label>
      <div class="btn-group">
        <button class="btn-srv active" id="srv-a" onclick="setSrv('A')">Player A serving</button>
        <button class="btn-srv" id="srv-b" onclick="setSrv('B')">Player B serving</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Quick States</div>
    <div class="quick-grid">
      <button class="qs" onclick="qs(0)"><span class="qs-num">0</span><span class="qs-desc">Match start 0-0</span></button>
      <button class="qs" onclick="qs(1)"><span class="qs-num">1</span><span class="qs-desc">Up 1 set, 3-3 set2, A serves</span></button>
      <button class="qs" onclick="qs(2)"><span class="qs-num">2</span><span class="qs-desc">Up 1 set, 1-3 set2, B serves</span></button>
      <button class="qs" onclick="qs(3)"><span class="qs-num">3</span><span class="qs-desc">Down 1 set, 1-1 set2, A serves</span></button>
      <button class="qs" onclick="qs(4)"><span class="qs-num">4</span><span class="qs-desc">1-1 sets, 3-3 set3, A serves</span></button>
      <button class="qs" onclick="qs(5)"><span class="qs-num">5</span><span class="qs-desc">1-1 sets, 3-3 set3, B serves</span></button>
      <button class="qs gold-state" onclick="qs(6)"><span class="qs-num g">★ 6</span><span class="qs-desc">Up set+break, 3-1 set2, A serves</span></button>
      <button class="qs" onclick="qs(7)"><span class="qs-num">7</span><span class="qs-desc">Down set+break, 1-3 set2, B serves</span></button>
      <button class="qs" onclick="qs(8)"><span class="qs-num">8</span><span class="qs-desc">1-1 sets, 5-5 set3, A serves</span></button>
      <button class="qs gold-state" onclick="qs(9)"><span class="qs-num g">★ 9</span><span class="qs-desc">1-1 sets, 5-4 set3, A serves</span></button>
      <button class="qs" onclick="qs(10)" style="grid-column:span 2"><span class="qs-num">10</span><span class="qs-desc">1-1 sets, 0-0 start of set3, A serves</span></button>
    </div>
  </div>

  <div class="error" id="err"></div>
  <button class="calc-btn" onclick="calc()">Calculate Probability</button>

  <div class="result" id="result">
    <div class="result-who" id="r-who"></div>
    <div class="result-pct hi" id="r-pct">-</div>
    <div class="result-band" id="r-band">-</div>
    <div class="result-grid">
      <div class="result-cell"><div class="result-cell-val" id="r-pre">-</div><div class="result-cell-key">Pre-match</div></div>
      <div class="result-cell"><div class="result-cell-val" id="r-gap">-</div><div class="result-cell-key">Elo gap</div></div>
      <div class="result-cell"><div class="result-cell-val" id="r-surf">-</div><div class="result-cell-key">Surface</div></div>
    </div>
    <div class="result-note" id="r-note"></div>
  </div>

  <div style="height:30px"></div>
</div>

<script>
var tour = 'ATP';
var surf = 'hard';
var srv  = 'A';

function setTour(t) {
  tour = t;
  document.getElementById('tab-atp').classList.toggle('active', t === 'ATP');
  document.getElementById('tab-wta').classList.toggle('active', t === 'WTA');
}

function setSurf(s) {
  surf = s;
  var list = ['hard','clay','grass'];
  for (var i = 0; i < list.length; i++) {
    var b = document.getElementById('sf-' + list[i]);
    b.className = 'btn-surf' + (list[i] === s ? ' active-' + s : '');
  }
}

function setSrv(s) {
  srv = s;
  document.getElementById('srv-a').classList.toggle('active', s === 'A');
  document.getElementById('srv-b').classList.toggle('active', s === 'B');
}

var QS = [
  [0,0,0,0,'A'],[1,0,3,3,'A'],[1,0,1,3,'B'],[0,1,1,1,'A'],
  [1,1,3,3,'A'],[1,1,3,3,'B'],[1,0,3,1,'A'],[0,1,1,3,'B'],
  [1,1,5,5,'A'],[1,1,5,4,'A'],[1,1,0,0,'A']
];

function qs(n) {
  var q = QS[n];
  document.getElementById('sets-a').value  = q[0];
  document.getElementById('sets-b').value  = q[1];
  document.getElementById('games-a').value = q[2];
  document.getElementById('games-b').value = q[3];
  setSrv(q[4]);
}

// ── MATH ─────────────────────────────────────────────────────

// P(server wins game | p = point win prob on serve)
function gameProb(p) {
  if (p <= 0) return 0;
  if (p >= 1) return 1;
  var q = 1 - p;
  var deuce = 20 * Math.pow(p * q, 3);
  var wD = (p * p) / (p * p + q * q);
  return Math.pow(p,4) + 4*Math.pow(p,4)*q + 10*Math.pow(p,4)*q*q + deuce*wD;
}

// P(A wins tiebreak) — iterative via table, no recursion
function tbWin(pa, pb, aFirst) {
  // Build table for ta=0..13, tb=0..13
  // tb[ta][tb] = P(A wins tiebreak from this state)
  var T = [];
  var i, j;
  for (i = 0; i <= 14; i++) {
    T[i] = [];
    for (j = 0; j <= 14; j++) {
      T[i][j] = -1;
    }
  }

  // Who serves at point index `tot` (0-based total points played so far)
  function aServes(tot) {
    if (tot === 0) return aFirst;
    var grp = Math.floor((tot - 1) / 2);
    var firstSrv = (grp % 2 === 1);
    return aFirst ? firstSrv : !firstSrv;
  }

  // Fill iteratively using memoization with explicit stack
  function solve(ta, tb) {
    if (T[ta][tb] !== -1) return T[ta][tb];
    // Terminal
    if (ta >= 7 && ta - tb >= 2) { T[ta][tb] = 1; return 1; }
    if (tb >= 7 && tb - ta >= 2) { T[ta][tb] = 0; return 0; }
    var aS = aServes(ta + tb);
    var pW = aS ? pa : (1 - pb);
    var v = pW * solve(ta+1, tb) + (1-pW) * solve(ta, tb+1);
    T[ta][tb] = v;
    return v;
  }

  // Pre-fill terminal states
  for (i = 0; i <= 14; i++) {
    for (j = 0; j <= 14; j++) {
      if (i >= 7 && i - j >= 2) T[i][j] = 1;
      else if (j >= 7 && j - i >= 2) T[i][j] = 0;
    }
  }

  // Fill backwards from high scores to low
  for (i = 13; i >= 0; i--) {
    for (j = 13; j >= 0; j--) {
      if (T[i][j] === -1) {
        var aS2 = aServes(i + j);
        var pW2 = aS2 ? pa : (1 - pb);
        // ensure children are filled
        var r1 = (T[i+1] && T[i+1][j] !== -1) ? T[i+1][j] : solve(i+1, j);
        var r2 = (T[i] && T[i][j+1] !== -1) ? T[i][j+1] : solve(i, j+1);
        T[i][j] = pW2 * r1 + (1-pW2) * r2;
      }
    }
  }

  return T[0][0];
}

// P(A wins set) — iterative, no recursion
function setWin(gA, gB, aServes0, ha, hb, pa, pb) {
  // Cache: key = a*1000 + b*10 + srv
  var cache = {};

  function terminal(a, b) {
    if (a === 7 && b === 6) return 1;
    if (b === 7 && a === 6) return 0;
    if (a === 7 && b === 5) return 1;
    if (b === 7 && a === 5) return 0;
    if (a >= 6 && a - b >= 2) return 1;
    if (b >= 6 && b - a >= 2) return 0;
    return -1; // not terminal
  }

  function solve(a, b, s) {
    var t = terminal(a, b);
    if (t !== -1) return t;
    var k = a * 1000 + b * 10 + (s ? 1 : 0);
    if (cache[k] !== undefined) return cache[k];
    if (a === 6 && b === 6) {
      cache[k] = tbWin(pa, pb, s);
      return cache[k];
    }
    var pW = s ? ha : (1 - hb);
    cache[k] = pW * solve(a+1, b, !s) + (1-pW) * solve(a, b+1, !s);
    return cache[k];
  }

  // Pre-fill iteratively from end states backwards
  var a, b, s, k, t, pW;
  for (a = 7; a >= 0; a--) {
    for (b = 7; b >= 0; b--) {
      for (s = 0; s <= 1; s++) {
        t = terminal(a, b);
        if (t !== -1) {
          k = a*1000 + b*10 + s;
          cache[k] = t;
        } else if (a === 6 && b === 6) {
          k = a*1000 + b*10 + s;
          cache[k] = tbWin(pa, pb, s === 1);
        }
      }
    }
  }

  // Now fill remaining states backwards
  for (a = 6; a >= 0; a--) {
    for (b = 6; b >= 0; b--) {
      for (s = 0; s <= 1; s++) {
        k = a*1000 + b*10 + s;
        if (cache[k] === undefined) {
          t = terminal(a, b);
          if (t !== -1) {
            cache[k] = t;
          } else {
            pW = (s === 1) ? ha : (1 - hb);
            var k1 = (a+1)*1000 + b*10 + (1-s);
            var k2 = a*1000 + (b+1)*10 + (1-s);
            var v1 = (cache[k1] !== undefined) ? cache[k1] : solve(a+1, b, s===0);
            var v2 = (cache[k2] !== undefined) ? cache[k2] : solve(a, b+1, s===0);
            cache[k] = pW * v1 + (1-pW) * v2;
          }
        }
      }
    }
  }

  var startKey = gA*1000 + gB*10 + (aServes0 ? 1 : 0);
  return cache[startKey] !== undefined ? cache[startKey] : solve(gA, gB, aServes0);
}

function freshS(ha, hb, pa, pb) {
  var s1 = setWin(0, 0, true,  ha, hb, pa, pb);
  var s2 = setWin(0, 0, false, ha, hb, pa, pb);
  return (s1 + s2) / 2;
}

function matchWin(sA, sB, gA, gB, aS, ha, hb, pa, pb) {
  var pCur = setWin(gA, gB, aS, ha, hb, pa, pb);
  var S = freshS(ha, hb, pa, pb);
  if (sA === 1 && sB === 1) return pCur;
  if (sA === 1 && sB === 0) return pCur + (1-pCur) * S;
  if (sA === 0 && sB === 1) return pCur * S;
  return pCur * S * (2-S) + (1-pCur) * S * S;
}

var BASE = {
  ATP: { hard:0.630, clay:0.580, grass:0.670 },
  WTA: { hard:0.565, clay:0.525, grass:0.590 }
};

function calibrate(base, Pelo) {
  var maxD = Math.min(base - 0.02, 0.98 - base);
  function compute(d) {
    var pf = base + d, pu = base - d;
    var hf = gameProb(pf), hu = gameProb(pu);
    var Saf = setWin(0,0,true,  hf,hu,pf,pu);
    var Sbf = setWin(0,0,false, hf,hu,pf,pu);
    var S = (Saf + Sbf) / 2;
    return Saf*S*(2-S) + (1-Saf)*S*S;
  }
  var lo = 0, hi = maxD, m;
  for (var i = 0; i < 60; i++) {
    m = (lo + hi) / 2;
    if (compute(m) < Pelo) { lo = m; } else { hi = m; }
  }
  return (lo + hi) / 2;
}

// ── MAIN ─────────────────────────────────────────────────────
function calc() {
  try {
    var eA = parseFloat(document.getElementById('elo-a').value);
    var eB = parseFloat(document.getElementById('elo-b').value);
    var sA = parseInt(document.getElementById('sets-a').value)  || 0;
    var sB = parseInt(document.getElementById('sets-b').value)  || 0;
    var gA = parseInt(document.getElementById('games-a').value) || 0;
    var gB = parseInt(document.getElementById('games-b').value) || 0;
    var aServes = (srv === 'A');

    var errEl = document.getElementById('err');
    var resEl = document.getElementById('result');

    function fail(msg) {
      errEl.textContent = msg;
      errEl.classList.add('show');
      resEl.classList.remove('show');
    }
    errEl.classList.remove('show');

    if (isNaN(eA) || isNaN(eB) || eA < 100 || eB < 100) return fail('Enter valid Elo ratings for both players');
    if (eA === eB) return fail('Elo ratings are identical');
    if (sA < 0 || sA > 1 || sB < 0 || sB > 1) return fail('Sets: valid values are 0 or 1');
    if (gA < 0 || gA > 7 || gB < 0 || gB > 7) return fail('Games: valid values are 0 to 7');

    var favIsA = (eA > eB);
    var eloFav = Math.max(eA,eB), eloUnd = Math.min(eA,eB);
    var gap    = eloFav - eloUnd;
    var Pelo   = 1 / (1 + Math.pow(10, -gap/400));

    var sF   = favIsA ? sA : sB;
    var sU   = favIsA ? sB : sA;
    var gF   = favIsA ? gA : gB;
    var gU   = favIsA ? gB : gA;
    var favS = favIsA ? aServes : !aServes;

    var base  = BASE[tour][surf];
    var delta = calibrate(base, Pelo);
    var pf = base + delta, pu = base - delta;
    var hf = gameProb(pf),  hu = gameProb(pu);

    var prob   = matchWin(sF, sU, gF, gU, favS, hf, hu, pf, pu);
    var pct    = Math.round(prob  * 1000) / 10;
    var prePct = Math.round(Pelo  * 1000) / 10;
    var band   = gap < 50 ? 'E0' : gap < 150 ? 'E1' : gap < 300 ? 'E2' : 'E3';

    var pEl = document.getElementById('r-pct');
    var cls = (pct >= 70) ? 'hi' : (pct >= 55) ? 'mid' : (pct >= 40) ? 'lo' : 'crit';
    pEl.textContent = pct.toFixed(1) + '%';
    pEl.className   = 'result-pct ' + cls;

    var bc  = { E0:'#4d9fff', E1:'#4d9fff', E2:'#00e5a0', E3:'#ffc947' };
    var bEl = document.getElementById('r-band');
    bEl.textContent    = band + '  |  Gap: ' + Math.round(gap) + ' pts';
    bEl.style.color    = bc[band];
    bEl.style.background = bc[band] + '18';
    bEl.style.border   = '1px solid ' + bc[band] + '44';

    document.getElementById('r-pre').textContent  = prePct.toFixed(1) + '%';
    document.getElementById('r-gap').textContent  = Math.round(gap);
    var sNames = { hard:'Hard', clay:'Clay', grass:'Grass' };
    document.getElementById('r-surf').textContent = sNames[surf];
    document.getElementById('r-who').textContent  =
      'Win probability — ' + (favIsA ? 'Player A (Favorite)' : 'Player A (Underdog)');

    var diff = Math.abs(pct - prePct);
    var note = 'Markov Chain calibrated to Elo | ' + sNames[surf];
    if (diff > 10) note += ' | ' + diff.toFixed(1) + 'pp shift vs pre-match';
    if (pct >= 90) note += ' | Rare state — compare to market';
    document.getElementById('r-note').textContent = note;

    resEl.classList.add('show');
    setTimeout(function() {
      resEl.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }, 50);

  } catch(e) {
    alert('Error: ' + e.message);
  }
}

setSurf('hard');
</script>
